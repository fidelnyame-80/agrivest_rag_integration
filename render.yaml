services:
  - type: web
    name: agrivest-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: bun install --frozen-lockfile && bun run build
    startCommand: bun run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CORS_ORIGIN
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_MODEL
        value: meta/llama-3.1-8b-instruct
      - key: NVIDIA_EMBEDDING_MODEL
        value: nvidia/nv-embedqa-e5-v5
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        value: agrivest-knowledge
      - key: PINECONE_NAMESPACE
        value: knowledge
      - key: PINECONE_CLOUD
        value: aws
      - key: PINECONE_REGION
        value: us-east-1
      - key: ADMIN_API_KEY
        generateValue: true
      - key: RAG_TOP_K
        value: 4
      - key: RAG_MIN_SCORE
        value: 0.18
      - key: CHAT_MAX_TOKENS
        value: 120
